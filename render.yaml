# render.yaml — Render Blueprint for OAU Enviro Rank
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: oau-enviro-rank
    runtime: node
    plan: free
    region: virginia
    branch: main
    buildCommand: npm install && npm run build && npx prisma db push
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: oau-enviro-rank-db
          property: connectionString
      - key: NODE_ENV
        value: production
      # sync: false means Render will NOT overwrite values you set manually in the Dashboard.
      - key: SESSION_SECRET
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false

databases:
  - name: oau-enviro-rank-db
    plan: free
    region: virginia
    databaseName: oau_enviro_rank
    user: oau_admin